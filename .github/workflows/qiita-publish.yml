name: Publish to Qiita

on:
  push:
    branches:
      - main
    paths:
      - 'articles/**'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Qiita CLI
        run: npm install -g @qiita/qiita-cli

      - name: Prepare articles for Qiita
        run: |
          python3 - <<'EOF'
          import os, re, json

          GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/0ceanMoo/myBlog/main'

          mapping = {}
          if os.path.exists('.qiita-mapping.json'):
              with open('.qiita-mapping.json') as f:
                  mapping = json.load(f)

          os.makedirs('public', exist_ok=True)

          for fn in os.listdir('articles'):
              if not fn.endswith('.md'):
                  continue
              slug = fn[:-3]
              with open(f'articles/{fn}') as f:
                  content = f.read()

              # IDをフロントマター先頭に注入
              qiita_id = mapping.get(slug, 'null')
              content = re.sub(r'^(---\n)', rf'\1id: {qiita_id}\n', content, count=1)

              # 画像URLをGitHub raw URLに置換
              content = content.replace('](/images/', f']({GITHUB_RAW_BASE}/images/')

              with open(f'public/{fn}', 'w') as f:
                  f.write(content)

          print('Done preparing articles')
          EOF

      - name: Publish to Qiita
        run: qiita publish --all
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}

      - name: Update Qiita ID mapping
        run: |
          python3 - <<'EOF'
          import os, re, json

          mapping = {}
          if os.path.exists('.qiita-mapping.json'):
              with open('.qiita-mapping.json') as f:
                  mapping = json.load(f)

          for fn in os.listdir('public'):
              if not fn.endswith('.md'):
                  continue
              slug = fn[:-3]
              with open(f'public/{fn}') as f:
                  content = f.read()
              m = re.search(r'^id:\s*(\S+)', content, re.MULTILINE)
              if m:
                  qiita_id = m.group(1).strip()
                  if qiita_id and qiita_id != 'null':
                      mapping[slug] = qiita_id
                      print(f'Mapped: {slug} -> {qiita_id}')

          with open('.qiita-mapping.json', 'w') as f:
              json.dump(mapping, f, indent=2, ensure_ascii=False)
          EOF

      - name: Commit updated mapping
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .qiita-mapping.json
          git diff --staged --quiet || git commit -m "chore: update Qiita ID mapping [skip ci]"
          git push
